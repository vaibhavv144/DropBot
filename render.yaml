# Render Blueprint — deploys the FastAPI backend.
# The database lives on Supabase (free, permanent Postgres), so no Render
# database is provisioned here — you set DATABASE_URL manually in the Render
# dashboard using your Supabase connection string (see DEPLOY.md).
# The backend also serves the widget loader at /embed.js, so this is the only
# backend deployment needed. The dashboard is deployed separately on Vercel.
services:
  - type: web
    name: dropbot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Auto-generated strong secret for signing JWTs.
      - key: SECRET_KEY
        generateValue: true
      # Supabase Postgres connection string — paste it in the Render dashboard
      # (Environment tab). Kept out of the repo since it contains a password.
      - key: DATABASE_URL
        sync: false
      # Paste your key in the Render dashboard. Leave unset to run with the
      # offline extractive fallback.
      - key: GEMINI_API_KEY
        sync: false
